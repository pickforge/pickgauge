<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ForgeGauge color palette</title>
  <desc id="desc">Primary brand colors for ForgeGauge.</desc>
  <rect width="1200" height="420" fill="#f6f7fb"/>
  <text x="60" y="80" fill="#172033" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">ForgeGauge Palette</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    <g transform="translate(60 135)">
      <rect width="160" height="160" rx="18" fill="#2563eb"/>
      <text y="210" fill="#172033">Codex Blue</text>
      <text y="242" fill="#647084" font-size="18">#2563eb</text>
    </g>
    <g transform="translate(260 135)">
      <rect width="160" height="160" rx="18" fill="#c75b12"/>
      <text y="210" fill="#172033">Claude Orange</text>
      <text y="242" fill="#647084" font-size="18">#c75b12</text>
    </g>
    <g transform="translate(460 135)">
      <rect width="160" height="160" rx="18" fill="#172033"/>
      <text y="210" fill="#172033">Charcoal</text>
      <text y="242" fill="#647084" font-size="18">#172033</text>
    </g>
    <g transform="translate(660 135)">
      <rect width="160" height="160" rx="18" fill="#647084"/>
      <text y="210" fill="#172033">Slate</text>
      <text y="242" fill="#647084" font-size="18">#647084</text>
    </g>
    <g transform="translate(860 135)">
      <rect width="160" height="160" rx="18" fill="#dc2626"/>
      <text y="210" fill="#172033">Low Red</text>
      <text y="242" fill="#647084" font-size="18">#dc2626</text>
    </g>
    <g transform="translate(1060 135)">
      <rect width="80" height="160" rx="18" fill="#ffffff" stroke="#d8dee9" stroke-width="4"/>
      <text x="-10" y="210" fill="#172033">Surface</text>
      <text x="-10" y="242" fill="#647084" font-size="18">#f6f7fb</text>
    </g>
  </g>
</svg>
