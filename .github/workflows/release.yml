name: Release PickGauge

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

env:
  GH_REPO: ${{ github.repository }}

concurrency:
  group: pickgauge-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_notes="$(cat <<'EOF'
          ## Platform support

          PickGauge is Linux/KDE-first. Windows and macOS builds are generated automatically, but they are currently untested.

          If you try PickGauge on Windows or macOS, personal experience reports, issues, and pull requests are very welcome so these builds can improve over time.
          EOF
          )"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; reusing it."
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --title "PickGauge ${RELEASE_TAG}" \
              --notes "$release_notes" \
              --generate-notes
          fi

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    # Run the build matrix for manual dispatches too; jobs whose needs are
    # skipped would be skipped, so gate on "not failed" instead.
    if: always() && needs.create-release.result != 'failure'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-appimage
            os: ubuntu-22.04
          - name: windows
            os: windows-2025-vs2026
          - name: macos-intel
            os: macos-15-intel
          - name: macos-apple-silicon
            os: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            wget
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || \
            sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri bundles
        env:
          # Updater signing — set these repo secrets so `tauri build` emits the
          # signed `.sig` artifacts the in-app updater verifies.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          bundle_args=()
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export NO_STRIP=1
            bundle_args=(--bundles appimage)
          fi
          bun run tauri build "${bundle_args[@]}"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          while IFS= read -r -d '' asset; do
            cp "$asset" "release-assets/${{ matrix.name }}-$(basename "$asset")"
          done < <(
            find src-tauri/target/release/bundle -type f \
              \( -name '*.AppImage' \
              -o -name '*.AppImage.sig' \
              -o -name '*.deb' \
              -o -name '*.rpm' \
              -o -name '*.msi' \
              -o -name '*.msi.sig' \
              -o -name '*.exe' \
              -o -name '*.exe.sig' \
              -o -name '*.dmg' \
              -o -name '*.app.tar.gz' \
              -o -name '*.app.tar.gz.sig' \) \
              -print0
          )

          asset_count="$(find release-assets -type f | wc -l | tr -d ' ')"
          if [[ "$asset_count" == "0" ]]; then
            echo "No release assets were produced."
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pickgauge-${{ matrix.name }}-${{ github.run_number }}
          path: release-assets/

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

  publish-release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs:
      - create-release
      - build
    if: startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success'
    steps:
      - name: Generate updater manifest (latest.json)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          download_base="https://github.com/${GH_REPO}/releases/download/${RELEASE_TAG}"

          mkdir -p updater-sigs
          gh release download "$RELEASE_TAG" --dir updater-sigs --pattern '*.sig' --clobber

          platforms='{}'
          add_platform() {
            local key="$1" sig_file="$2" bundle_name signature url
            bundle_name="$(basename "${sig_file%.sig}")"
            signature="$(cat "$sig_file")"
            url="${download_base}/${bundle_name}"
            platforms="$(jq \
              --arg key "$key" --arg sig "$signature" --arg url "$url" \
              '.[$key] = {signature: $sig, url: $url}' <<<"$platforms")"
          }

          # Linux AppImage
          while IFS= read -r -d '' sig; do
            add_platform "linux-x86_64" "$sig"
          done < <(find updater-sigs -name 'linux-appimage-*.AppImage.sig' -print0)

          # Windows: the updater installs the NSIS `-setup.exe`; fall back to MSI.
          win_sig="$(find updater-sigs -name 'windows-*-setup.exe.sig' | head -n1)"
          if [[ -z "$win_sig" ]]; then
            win_sig="$(find updater-sigs \( -name 'windows-*.exe.sig' -o -name 'windows-*.msi.sig' \) | head -n1)"
          fi
          [[ -n "$win_sig" ]] && add_platform "windows-x86_64" "$win_sig"

          # macOS (per-arch app bundle archives)
          while IFS= read -r -d '' sig; do
            add_platform "darwin-x86_64" "$sig"
          done < <(find updater-sigs -name 'macos-intel-*.app.tar.gz.sig' -print0)
          while IFS= read -r -d '' sig; do
            add_platform "darwin-aarch64" "$sig"
          done < <(find updater-sigs -name 'macos-apple-silicon-*.app.tar.gz.sig' -print0)

          jq -n \
            --arg version "$version" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$platforms" \
            '{version: $version, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json
          cat latest.json

          if [[ "$(jq '.platforms | length' latest.json)" == "0" ]]; then
            echo "No signed updater artifacts found; refusing to publish an empty latest.json."
            exit 1
          fi

          gh release upload "$RELEASE_TAG" latest.json --clobber

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false
