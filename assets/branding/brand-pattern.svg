<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">ForgeGauge brand pattern</title>
  <desc id="desc">Subtle split gauge pattern for backgrounds.</desc>
