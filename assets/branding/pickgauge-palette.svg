<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">PickGauge color palette</title>
  <desc id="desc">Primary Pickforge Studio colors used by PickGauge.</desc>
  <rect width="1200" height="420" fill="#0A0A0B"/>
  <text x="60" y="80" fill="#F2F2F3" font-family="Geist, Inter, Arial, sans-serif" font-size="48" font-weight="750">PickGauge Palette</text>
  <g font-family="Geist Mono, JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#F2F2F3">
    <rect x="60" y="130" width="180" height="160" rx="18" fill="#0A0A0B" stroke="#F2F2F3" stroke-opacity="0.14"/>
    <text x="60" y="330">#0A0A0B</text>
    <rect x="280" y="130" width="180" height="160" rx="18" fill="#0F0F11" stroke="#F2F2F3" stroke-opacity="0.14"/>
    <text x="280" y="330">#0F0F11</text>
    <rect x="500" y="130" width="180" height="160" rx="18" fill="#F2F2F3"/>
    <text x="500" y="330">#F2F2F3</text>
    <rect x="720" y="130" width="180" height="160" rx="18" fill="#6E6E75"/>
    <text x="720" y="330">#6E6E75</text>
    <rect x="940" y="130" width="180" height="160" rx="18" fill="#FF7A1A"/>
    <text x="940" y="330">#FF7A1A</text>
  </g>
</svg>
