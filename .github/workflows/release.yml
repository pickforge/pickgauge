name: Release PickGauge

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

env:
  GH_REPO: ${{ github.repository }}

concurrency:
  group: pickgauge-release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_notes="$(cat <<'EOF'
          ## Platform support

          PickGauge is Linux/KDE-first. Windows and macOS builds are generated automatically, but they are currently untested.

          If you try PickGauge on Windows or macOS, personal experience reports, issues, and pull requests are very welcome so these builds can improve over time.
          EOF
          )"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; reusing it."
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --title "PickGauge ${RELEASE_TAG}" \
              --notes "$release_notes" \
              --generate-notes
          fi

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    # Run the build matrix for manual dispatches too; jobs whose needs are
    # skipped would be skipped, so gate on "not failed" instead.
    if: always() && needs.create-release.result != 'failure'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-appimage
            os: ubuntu-22.04
          - name: windows
            os: windows-2025-vs2026
          - name: macos-intel
            os: macos-15-intel
          - name: macos-apple-silicon
            os: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            wget
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || \
            sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate release config
        run: bun run pickforge-tauri-release validate-config

      - name: Build Tauri bundles
        env:
          # Updater signing — set these repo secrets so `tauri build` emits the
          # signed `.sig` artifacts the in-app updater verifies.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          bundle_args=()
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export NO_STRIP=1
            bundle_args=(--bundles appimage)
          fi
          bun run tauri build "${bundle_args[@]}"

      # linuxdeploy bundles the Ubuntu build host's libwayland into the
      # AppImage, which breaks EGL display creation on hosts with newer
      # Mesa/Wayland (white window, "EGL_BAD_PARAMETER"). libwayland must
      # come from the host, so strip it, repack, and re-sign the updater
      # artifact. See tauri-apps/tauri#11988.
      - name: Strip bundled libwayland from AppImage
        if: runner.os == 'Linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          sudo apt-get install -y --no-install-recommends squashfs-tools
          shopt -s nullglob
          appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)
          if [[ ${#appimages[@]} -eq 0 ]]; then
            echo "No AppImage found to post-process" >&2
            exit 1
          fi
          for appimage in "${appimages[@]}"; do
            workdir="$(mktemp -d)"
            offset="$("$appimage" --appimage-offset)"
            tail -c +"$((offset + 1))" "$appimage" >"$workdir/payload.squashfs"
            unsquashfs -q -d "$workdir/AppDir" "$workdir/payload.squashfs"
            libs=("$workdir"/AppDir/usr/lib/libwayland-*.so*)
            if [[ ${#libs[@]} -eq 0 ]]; then
              echo "$appimage: no bundled libwayland, leaving as is"
              rm -rf "$workdir"
              continue
            fi
            printf "%s: removing %s\n" "$appimage" "${libs[*]##*/}"
            rm -- "${libs[@]}"
            comp="$(unsquashfs -s "$workdir/payload.squashfs" | awk '/^Compression/ {print $2}')"
            head -c "$offset" "$appimage" >"$workdir/runtime"
            mksquashfs "$workdir/AppDir" "$workdir/repacked.squashfs" \
              -quiet -root-owned -noappend -comp "${comp:-zstd}" -b 131072
            if unsquashfs -l "$workdir/repacked.squashfs" | grep -q libwayland-; then
              echo "$appimage: libwayland still present after repack" >&2
              exit 1
            fi
            cat "$workdir/runtime" "$workdir/repacked.squashfs" >"$appimage"
            chmod +x "$appimage"
            if [[ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
              rm -f "$appimage.sig"
              bun run tauri signer sign "$appimage"
              test -s "$appimage.sig"
            fi
            rm -rf "$workdir"
          done

      - name: Upload debug symbols to Sentry
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: pickforge
          SENTRY_PROJECT: pickgauge
        shell: bash
        run: |
          if [[ -z "${SENTRY_AUTH_TOKEN:-}" ]]; then
            echo "SENTRY_AUTH_TOKEN not set; skipping"
            exit 0
          fi

          version="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"
          release="pickgauge@${version}"
          sentry_cli=(npx --yes @sentry/cli@latest)

          "${sentry_cli[@]}" debug-files upload --include-sources src-tauri/target/release
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            "${sentry_cli[@]}" sourcemaps upload --release "$release" dist
          fi

      - name: Collect release assets
        run: bun run pickforge-tauri-release collect-assets --prefix "${{ matrix.name }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pickgauge-${{ matrix.name }}-${{ github.run_number }}
          path: release-assets/

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

  publish-release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs:
      - create-release
      - build
    if: startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Generate updater manifest (latest.json)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          download_base="https://github.com/${GH_REPO}/releases/download/${RELEASE_TAG}"

          mkdir -p updater-assets
          gh release download "$RELEASE_TAG" --dir updater-assets --pattern '*' --clobber

          bun run pickforge-tauri-release generate-latest-json \
            --assets-dir updater-assets \
            --version "$version" \
            --download-base-url "$download_base" \
            --out latest.json
          bun run pickforge-tauri-release verify-latest-json --input latest.json

          gh release upload "$RELEASE_TAG" latest.json --clobber

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false
