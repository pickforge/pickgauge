name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    name: Check and build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Svelte type check
        run: bun run check

      - name: Frontend and sidecar tests
        run: bun run test

      - name: Frontend coverage
        run: bun run test:coverage

      - name: Summarize frontend coverage
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("fs");
          const lcov = fs.readFileSync("coverage/lcov.info", "utf8");
          let found = 0;
          let hit = 0;
          for (const line of lcov.split("\n")) {
            if (line.startsWith("LF:")) found += Number(line.slice(3));
            if (line.startsWith("LH:")) hit += Number(line.slice(3));
          }
          const pct = found === 0 ? "0.00" : ((hit / found) * 100).toFixed(2);
          console.log(`## Coverage\n\nFrontend lines: ${pct}% (${hit}/${found})`);
          NODE

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: |
            coverage/lcov.info
            coverage/index.html
            coverage/

      - name: Build frontend
        run: bun run build

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --workspace --locked --all-targets

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --locked --all-targets -- -D warnings

      - name: Rust coverage
        run: |
          mkdir -p src-tauri/target/llvm-cov
          cargo llvm-cov --manifest-path src-tauri/Cargo.toml --workspace --locked --all-targets --fail-under-lines 80 --html --output-dir src-tauri/target/llvm-cov/html
          cargo llvm-cov report --manifest-path src-tauri/Cargo.toml --lcov --output-path src-tauri/target/llvm-cov/lcov.info

      - name: Summarize Rust coverage
        run: |
          rust_lines=$(awk '
            /^LF:/ { lines += substr($0, 4) }
            /^LH:/ { hit += substr($0, 4) }
            END {
              if (lines > 0) {
                printf "%.2f%% (%d/%d)", hit * 100 / lines, hit, lines
              } else {
                printf "no line data"
              }
            }
          ' src-tauri/target/llvm-cov/lcov.info)
          {
            echo
            echo "### Rust"
            echo "Lines: ${rust_lines}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Rust coverage
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: |
            src-tauri/target/llvm-cov/lcov.info
            src-tauri/target/llvm-cov/html/
